name: Dev Charter

on:
  schedule:
    - cron: "47 21 * * 0"  # 毎週 Sun 21:47 UTC
  workflow_dispatch:

jobs:
  check:
    name: Check
    uses: y-marui/dev-charter/.github/workflows/check-charter.yml@main
    with:
      prefix: docs/dev-charter
      fail_if_outdated: true
    permissions:
      contents: write
      pull-requests: write
